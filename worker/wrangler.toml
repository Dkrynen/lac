# LAC Pro delivery gate — stateless Cloudflare Worker.
# Validates a Polar license key, then streams the compiled Pro artifact
# from a private R2 bucket. No KV, no D1, no Durable Objects, no logging of
# the key. Cloudflare usage depends on the operator account and traffic.
#
# This file lives in the OPEN-SOURCE repo. Keep account-specific values as
# placeholders here; fill them from private operator notes before deploy.
#
# Deploy is Duan-gated (needs the Cloudflare account) — see README.md.

name = "lac-pro-gate"
main = "src/index.ts"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 0.1

[version_metadata]
binding = "CF_VERSION_METADATA"

[vars]
# Provider organization identifier. Replace from private operator notes before deploy.
POLAR_ORG_ID = "replace-from-private-operator-notes"
POLAR_API_BASE_URL = "replace-from-private-operator-notes"
# Polar benefit IDs allowed to download the shared compiled Pro artifact.
LOCAL_PRO_BENEFIT_ID = "replace-from-private-operator-notes"
PRO_CLOUD_BENEFIT_ID = "replace-from-private-operator-notes"
# Public identifier for the active Ed25519 receipt key. The PKCS#8 private key
# is an interactive Wrangler secret named ENTITLEMENT_SIGNING_PRIVATE_KEY.
ENTITLEMENT_SIGNING_KID = "replace-from-private-operator-notes"
ENTITLEMENT_SIGNING_PUBLIC_KEY = "replace-from-private-operator-notes"
# R2 object key of the artifact to stream. Replace from private operator notes before deploy.
ARTIFACT_KEY = "replace-from-private-operator-notes"
# Filename offered to the client in the Content-Disposition header.
ARTIFACT_FILENAME = "lac-pro.zip"
# SHA256 recorded when the private artifact is built and uploaded.
ARTIFACT_SHA256 = "replace-from-private-operator-notes"

# Private R2 bucket holding the compiled Pro artifact. In tests this binding is
# emulated locally. Replace the bucket name from private operator notes before deploy.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "replace-from-private-operator-notes"

# Eventually-consistent per-license abuse protection. This is deliberately
# separate from authoritative Cloud usage accounting.
[[ratelimits]]
name = "PRO_GATE_RATE_LIMITER"
namespace_id = "270001"

  [ratelimits.simple]
  limit = 20
  period = 60

# Named environments deliberately repeat every non-inheritable binding. Keep
# staging and production resources, domains, benefits, and artifacts distinct.
[env.staging]
name = "lac-pro-gate-staging"

  [env.staging.version_metadata]
  binding = "CF_VERSION_METADATA"

  [env.staging.vars]
  POLAR_ORG_ID = "replace-from-private-operator-notes"
  POLAR_API_BASE_URL = "https://sandbox-api.polar.sh/v1"
  LOCAL_PRO_BENEFIT_ID = "replace-from-private-operator-notes"
  PRO_CLOUD_BENEFIT_ID = "replace-from-private-operator-notes"
  ENTITLEMENT_SIGNING_KID = "replace-from-private-operator-notes"
  ENTITLEMENT_SIGNING_PUBLIC_KEY = "replace-from-private-operator-notes"
  ARTIFACT_KEY = "replace-from-private-operator-notes"
  ARTIFACT_FILENAME = "lac-pro.zip"
  ARTIFACT_SHA256 = "replace-from-private-operator-notes"

  [[env.staging.r2_buckets]]
  binding = "R2_BUCKET"
  bucket_name = "replace-staging-from-private-operator-notes"

  [[env.staging.ratelimits]]
  name = "PRO_GATE_RATE_LIMITER"
  namespace_id = "270101"

    [env.staging.ratelimits.simple]
    limit = 20
    period = 60

[env.production]
name = "lac-pro-gate"

  [env.production.version_metadata]
  binding = "CF_VERSION_METADATA"

  [env.production.vars]
  POLAR_ORG_ID = "replace-from-private-operator-notes"
  POLAR_API_BASE_URL = "https://api.polar.sh/v1"
  LOCAL_PRO_BENEFIT_ID = "replace-from-private-operator-notes"
  PRO_CLOUD_BENEFIT_ID = "replace-from-private-operator-notes"
  ENTITLEMENT_SIGNING_KID = "replace-from-private-operator-notes"
  ENTITLEMENT_SIGNING_PUBLIC_KEY = "replace-from-private-operator-notes"
  ARTIFACT_KEY = "replace-from-private-operator-notes"
  ARTIFACT_FILENAME = "lac-pro.zip"
  ARTIFACT_SHA256 = "replace-from-private-operator-notes"

  [[env.production.r2_buckets]]
  binding = "R2_BUCKET"
  bucket_name = "replace-production-from-private-operator-notes"

  [[env.production.ratelimits]]
  name = "PRO_GATE_RATE_LIMITER"
  namespace_id = "270201"

    [env.production.ratelimits.simple]
    limit = 20
    period = 60
