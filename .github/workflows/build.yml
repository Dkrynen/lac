name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web app (bundled into the exe)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+') {
            throw "Version must look like vX.Y.Z; got '$tag'"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Build installer with InnoSetup
        shell: pwsh
        run: |
          $version = "${{ steps.release_version.outputs.version }}"
          (Get-Content installer.iss) -replace '#define MyAppVersion ".+"', "#define MyAppVersion `"$version`"" | Set-Content installer.iss
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Write installer checksum
        shell: pwsh
        run: |
          $version = "${{ steps.release_version.outputs.version }}"
          $installer = Get-Item "dist\LAC-Setup-$version.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash
          "$hash  $($installer.Name)" | Set-Content dist\SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/LAC-Setup-*.exe
            dist/SHA256SUMS.txt
            dist/lac/lac.exe

  # Linux/macOS legs stay as COMPILE PROOF only — their binaries are NOT
  # attached to releases (v1 launch is Windows-first; macOS/Linux are teased
  # via the waitlist, each shipping as its own launch moment later).
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/lac

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/lac

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4

      - name: Create draft release (Windows installer only — review before publish)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: |
            windows-build/LAC-Setup-*.exe
            windows-build/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
