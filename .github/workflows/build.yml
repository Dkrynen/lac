name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Build installer with InnoSetup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.iss) -replace '1\.0\.0', $tag | Set-Content installer.iss
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Model-Hub-Setup-*.exe
            dist/model-hub.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/model-hub

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Create DMG
        run: |
          pip install dmgbuild
          dmgbuild -s .github/dmgsettings.py "Model Hub" dist/Model-Hub.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/Model-Hub.dmg
            dist/model-hub

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/Model-Hub-Setup-*.exe
            linux-build/model-hub
            macos-build/Model-Hub.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
